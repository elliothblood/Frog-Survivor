    function screenX(x) {
      return x - world.cameraX;
    }

    function screenY(y) {
      return y - world.cameraY;
    }

    function drawGround() {
      ctx.fillStyle = "#102a26";
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      const water = ctx.createLinearGradient(0, 0, window.innerWidth, window.innerHeight);
      water.addColorStop(0, "#12342f");
      water.addColorStop(0.52, "#1e4336");
      water.addColorStop(1, "#0d211f");
      ctx.fillStyle = water;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      ctx.fillStyle = "rgba(67, 88, 45, 0.32)";
      for (let i = 0; i < 34; i += 1) {
        const x = ((i * 827) % world.width) - world.cameraX;
        const y = ((i * 613) % world.height) - world.cameraY;
        if (x > -140 && x < window.innerWidth + 140 && y > -100 && y < window.innerHeight + 100) {
          ctx.beginPath();
          ctx.ellipse(x, y, 54 + (i % 5) * 14, 20 + (i % 4) * 7, i * 0.6, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.strokeStyle = "rgba(157, 218, 196, 0.14)";
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 42; i += 1) {
        const x = ((i * 389) % world.width) - world.cameraX;
        const y = ((i * 557) % world.height) - world.cameraY;
        if (x > -80 && x < window.innerWidth + 80 && y > -40 && y < window.innerHeight + 40) {
          ctx.beginPath();
          ctx.ellipse(x, y, 18 + (i % 4) * 9, 5 + (i % 3) * 2, i * 0.37, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      for (let i = 0; i < 36; i += 1) {
        const x = ((i * 491) % world.width) - world.cameraX;
        const y = ((i * 853) % world.height) - world.cameraY;
        if (x > -70 && x < window.innerWidth + 70 && y > -70 && y < window.innerHeight + 70) {
          const pad = 15 + (i % 5) * 4;
          ctx.fillStyle = i % 3 === 0 ? "#4e8e46" : "#3f7f3e";
          ctx.strokeStyle = "rgba(16, 46, 25, 0.65)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(x, y, pad, 0.18, Math.PI * 1.86);
          ctx.lineTo(x, y);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          if (i % 6 === 0) {
            ctx.fillStyle = "#e7d1e8";
            ctx.beginPath();
            ctx.arc(x + pad * 0.15, y - pad * 0.12, 3.2, 0, Math.PI * 2);
            ctx.arc(x + pad * 0.34, y - pad * 0.08, 3.2, 0, Math.PI * 2);
            ctx.arc(x + pad * 0.24, y + pad * 0.1, 3.2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      ctx.strokeStyle = "rgba(116, 142, 75, 0.7)";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      for (let i = 0; i < 46; i += 1) {
        const x = ((i * 719) % world.width) - world.cameraX;
        const y = ((i * 337) % world.height) - world.cameraY;
        if (x > -30 && x < window.innerWidth + 30 && y > -90 && y < window.innerHeight + 30) {
          const h = 24 + (i % 4) * 11;
          const lean = ((i % 5) - 2) * 2.8;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + lean, y - h);
          ctx.stroke();
          if (i % 3 === 0) {
            ctx.fillStyle = "#8b6f4a";
            ctx.beginPath();
            ctx.ellipse(x + lean, y - h - 5, 4, 10, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      ctx.fillStyle = "rgba(13, 26, 20, 0.22)";
      for (let i = 0; i < 30; i += 1) {
        const x = ((i * 947) % world.width) - world.cameraX;
        const y = ((i * 743) % world.height) - world.cameraY;
        if (x > -40 && x < window.innerWidth + 40 && y > -40 && y < window.innerHeight + 40) {
          ctx.beginPath();
          ctx.ellipse(x, y, 12 + (i % 5) * 4, 6 + (i % 3) * 3, i * 0.2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.strokeStyle = "rgba(210, 229, 181, 0.07)";
      ctx.lineWidth = 1;
      const current = 96;
      const startX = -world.cameraX % current;
      const startY = -world.cameraY % current;
      for (let x = startX; x < window.innerWidth; x += current) {
        ctx.beginPath();
        ctx.moveTo(x + Math.sin((x + world.time * 20) * 0.01) * 8, 0);
        ctx.lineTo(x - 18, window.innerHeight);
        ctx.stroke();
      }
      for (let y = startY; y < window.innerHeight; y += current) {
        ctx.beginPath();
        ctx.moveTo(0, y + Math.cos((y + world.time * 18) * 0.01) * 8);
        ctx.lineTo(window.innerWidth, y - 10);
        ctx.stroke();
      }
    }

    function drawPlayer() {
      const x = screenX(player.x);
      const y = screenY(player.y);
      const barWidth = 48;
      const barHeight = 7;
      const barX = x - barWidth / 2;
      const barY = y - player.radius - 18;

      ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
      ctx.fillRect(barX, barY, barWidth, barHeight);
      ctx.fillStyle = "#43d16f";
      ctx.fillRect(barX, barY, barWidth * clamp(player.hp / player.maxHp, 0, 1), barHeight);
      ctx.strokeStyle = "rgba(244, 242, 235, 0.65)";
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barWidth, barHeight);

      ctx.save();
      ctx.translate(x, y);

      ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
      ctx.beginPath();
      ctx.ellipse(0, player.radius * 0.72, player.radius * 0.95, player.radius * 0.36, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#58b94e";
      ctx.strokeStyle = "#173f24";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(0, 4, player.radius * 0.96, player.radius * 0.78, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#6fcf5f";
      ctx.strokeStyle = "#173f24";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(-9, -8, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(9, -8, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#f5f7da";
      ctx.beginPath();
      ctx.arc(-9, -9, 4.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(9, -9, 4.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#102516";
      ctx.beginPath();
      ctx.arc(-8, -8.5, 2.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(10, -8.5, 2.1, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#1f5b2c";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 3, 8, 0.18, Math.PI - 0.18);
      ctx.stroke();

      ctx.fillStyle = "#2f823b";
      ctx.beginPath();
      ctx.ellipse(-12, 13, 7, 4, -0.35, 0, Math.PI * 2);
      ctx.ellipse(12, 13, 7, 4, 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawEnemies() {
      const crowded = enemies.length > 80;
      for (const enemy of enemies) {
        if (enemy.dead) continue;
        const x = screenX(enemy.x);
        const y = screenY(enemy.y);
        if (x < -70 || x > window.innerWidth + 70 || y < -90 || y > window.innerHeight + 90) continue;
        const wobble = Math.sin(enemy.pulse) * 1.5;

        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.beginPath();
        ctx.ellipse(x, y + enemy.radius * 0.75, enemy.radius * 0.9, enemy.radius * 0.34, 0, 0, Math.PI * 2);
        ctx.fill();

        if (crowded && !enemy.isBoss) {
          const crowdColor = {
            fly: "#2d3330",
            bug: "#c55250",
            ladybug: "#d94e55",
            cricket: "#6a9f42",
            dragonfly: "#51b9d6",
            rhino: "#72564a",
            spider: "#4b3c4f",
            ant: "#2c211c",
            bee: "#d9b232",
          }[enemy.type] || enemy.color;
          ctx.fillStyle = crowdColor;
          ctx.strokeStyle = "rgba(10, 16, 14, 0.8)";
          ctx.lineWidth = 2;

          if (enemy.type === "ant") {
            ctx.beginPath();
            ctx.arc(x, y + wobble - enemy.radius * 0.48, enemy.radius * 0.34, 0, Math.PI * 2);
            ctx.arc(x, y + wobble, enemy.radius * 0.38, 0, Math.PI * 2);
            ctx.arc(x, y + wobble + enemy.radius * 0.48, enemy.radius * 0.44, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.strokeStyle = "rgba(10, 16, 14, 0.8)";
            ctx.lineWidth = 1.3;
            for (let i = -1; i <= 1; i += 1) {
              ctx.beginPath();
              ctx.moveTo(x - enemy.radius * 0.32, y + wobble + enemy.radius * i * 0.2);
              ctx.lineTo(x - enemy.radius * 0.9, y + wobble + enemy.radius * (i * 0.24 + 0.12));
              ctx.moveTo(x + enemy.radius * 0.32, y + wobble + enemy.radius * i * 0.2);
              ctx.lineTo(x + enemy.radius * 0.9, y + wobble + enemy.radius * (i * 0.24 + 0.12));
              ctx.stroke();
            }
          } else {
            if (enemy.type === "fly" || enemy.type === "dragonfly" || enemy.type === "bee") {
              ctx.fillStyle = "rgba(205, 239, 238, 0.42)";
              ctx.beginPath();
              ctx.ellipse(x - enemy.radius * 0.5, y + wobble - enemy.radius * 0.38, enemy.radius * 0.48, enemy.radius * 0.2, -0.45, 0, Math.PI * 2);
              ctx.ellipse(x + enemy.radius * 0.5, y + wobble - enemy.radius * 0.38, enemy.radius * 0.48, enemy.radius * 0.2, 0.45, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle = crowdColor;
            }

            ctx.beginPath();
            if (enemy.type === "dragonfly") {
              ctx.ellipse(x, y + wobble, enemy.radius * 0.42, enemy.radius * 1.05, 0, 0, Math.PI * 2);
            } else {
              ctx.ellipse(x, y + wobble, enemy.radius * 0.78, enemy.radius * 0.88, 0, 0, Math.PI * 2);
            }
            ctx.fill();
            ctx.stroke();

            if (enemy.type === "ladybug") {
              ctx.fillStyle = "#241514";
              ctx.beginPath();
              ctx.arc(x - enemy.radius * 0.25, y + wobble, enemy.radius * 0.1, 0, Math.PI * 2);
              ctx.arc(x + enemy.radius * 0.25, y + wobble, enemy.radius * 0.1, 0, Math.PI * 2);
              ctx.fill();
            } else if (enemy.type === "rhino") {
              ctx.fillStyle = "#d6c5a0";
              ctx.beginPath();
              ctx.moveTo(x, y + wobble - enemy.radius * 1.35);
              ctx.lineTo(x - enemy.radius * 0.18, y + wobble - enemy.radius * 0.62);
              ctx.lineTo(x + enemy.radius * 0.18, y + wobble - enemy.radius * 0.62);
              ctx.closePath();
              ctx.fill();
            } else if (enemy.type === "spider" || enemy.type === "cricket") {
              ctx.strokeStyle = "rgba(10, 16, 14, 0.82)";
              ctx.lineWidth = 1.5;
              for (let i = -1; i <= 1; i += 1) {
                ctx.beginPath();
                ctx.moveTo(x - enemy.radius * 0.55, y + wobble + enemy.radius * i * 0.18);
                ctx.lineTo(x - enemy.radius * 1.1, y + wobble + enemy.radius * (i * 0.26 + 0.15));
                ctx.moveTo(x + enemy.radius * 0.55, y + wobble + enemy.radius * i * 0.18);
                ctx.lineTo(x + enemy.radius * 1.1, y + wobble + enemy.radius * (i * 0.26 + 0.15));
                ctx.stroke();
              }
            }
          }

          if (enemy.hp < enemy.maxHp * 0.65) {
            const hpWidth = enemy.radius * 1.6;
            ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
            ctx.fillRect(x - hpWidth / 2, y - enemy.radius - 10, hpWidth, 4);
            ctx.fillStyle = "#ef5c5c";
            ctx.fillRect(x - hpWidth / 2, y - enemy.radius - 10, hpWidth * Math.max(0, enemy.hp / enemy.maxHp), 4);
          }
          continue;
        }

        if (enemy.type === "fly" || enemy.type === "bee") {
          const wing = 0.9 + Math.sin(enemy.pulse * 3) * 0.15;
          ctx.save();
          ctx.translate(x, y + wobble);

          ctx.fillStyle = "rgba(205, 239, 238, 0.55)";
          ctx.strokeStyle = "rgba(233, 255, 251, 0.75)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.ellipse(-enemy.radius * 0.58, -enemy.radius * 0.35, enemy.radius * 0.5, enemy.radius * 0.28 * wing, -0.55, 0, Math.PI * 2);
          ctx.ellipse(enemy.radius * 0.58, -enemy.radius * 0.35, enemy.radius * 0.5, enemy.radius * 0.28 * wing, 0.55, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = enemy.type === "bee" ? "#d9b232" : "#2d3330";
          ctx.strokeStyle = "#111614";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.ellipse(0, 1, enemy.radius * 0.52, enemy.radius * 0.78, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = enemy.type === "bee" ? "#241514" : "#8ae05c";
          ctx.beginPath();
          ctx.arc(-enemy.radius * 0.18, -enemy.radius * 0.45, enemy.radius * 0.17, 0, Math.PI * 2);
          ctx.arc(enemy.radius * 0.18, -enemy.radius * 0.45, enemy.radius * 0.17, 0, Math.PI * 2);
          ctx.fill();

          if (enemy.type === "bee") {
            ctx.strokeStyle = "#5c4215";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-enemy.radius * 0.42, -enemy.radius * 0.08);
            ctx.lineTo(enemy.radius * 0.42, -enemy.radius * 0.08);
            ctx.moveTo(-enemy.radius * 0.38, enemy.radius * 0.22);
            ctx.lineTo(enemy.radius * 0.38, enemy.radius * 0.22);
            ctx.stroke();
          }

          ctx.strokeStyle = "#111614";
          ctx.lineWidth = 1.5;
          for (let i = -1; i <= 1; i += 1) {
            ctx.beginPath();
            ctx.moveTo(-enemy.radius * 0.42, enemy.radius * i * 0.18);
            ctx.lineTo(-enemy.radius * 0.92, enemy.radius * (i * 0.22 + 0.16));
            ctx.moveTo(enemy.radius * 0.42, enemy.radius * i * 0.18);
            ctx.lineTo(enemy.radius * 0.92, enemy.radius * (i * 0.22 + 0.16));
            ctx.stroke();
          }
          ctx.restore();
        } else if (enemy.type === "dragonfly") {
          const wing = 0.9 + Math.sin(enemy.pulse * 4) * 0.18;
          ctx.save();
          ctx.translate(x, y + wobble);

          ctx.fillStyle = "rgba(165, 236, 245, 0.5)";
          ctx.strokeStyle = "rgba(225, 255, 255, 0.72)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.ellipse(-enemy.radius * 0.55, -enemy.radius * 0.38, enemy.radius * 0.82, enemy.radius * 0.2 * wing, -0.22, 0, Math.PI * 2);
          ctx.ellipse(enemy.radius * 0.55, -enemy.radius * 0.38, enemy.radius * 0.82, enemy.radius * 0.2 * wing, 0.22, 0, Math.PI * 2);
          ctx.ellipse(-enemy.radius * 0.48, enemy.radius * 0.12, enemy.radius * 0.72, enemy.radius * 0.18 * wing, 0.24, 0, Math.PI * 2);
          ctx.ellipse(enemy.radius * 0.48, enemy.radius * 0.12, enemy.radius * 0.72, enemy.radius * 0.18 * wing, -0.24, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#3b97a8";
          ctx.strokeStyle = "#12343b";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.ellipse(0, 2, enemy.radius * 0.25, enemy.radius * 1.08, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#75d7d4";
          ctx.beginPath();
          ctx.arc(0, -enemy.radius * 0.86, enemy.radius * 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#182d2f";
          ctx.beginPath();
          ctx.arc(-enemy.radius * 0.1, -enemy.radius * 0.9, enemy.radius * 0.08, 0, Math.PI * 2);
          ctx.arc(enemy.radius * 0.1, -enemy.radius * 0.9, enemy.radius * 0.08, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        } else if (enemy.type === "queenBee") {
          ctx.save();
          ctx.translate(x, y + wobble);
          const wing = 1 + Math.sin(enemy.pulse * 3.6) * 0.16;

          ctx.fillStyle = "rgba(236, 250, 232, 0.5)";
          ctx.strokeStyle = "rgba(245, 255, 246, 0.78)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.ellipse(-enemy.radius * 0.68, -enemy.radius * 0.22, enemy.radius * 0.72, enemy.radius * 0.34 * wing, -0.55, 0, Math.PI * 2);
          ctx.ellipse(enemy.radius * 0.68, -enemy.radius * 0.22, enemy.radius * 0.72, enemy.radius * 0.34 * wing, 0.55, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#d9b232";
          ctx.strokeStyle = "#3c2a11";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.ellipse(0, 2, enemy.radius * 0.66, enemy.radius * 0.92, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.strokeStyle = "#5c4215";
          ctx.lineWidth = 4;
          for (const stripe of [-0.32, 0.02, 0.36]) {
            ctx.beginPath();
            ctx.moveTo(-enemy.radius * 0.52, enemy.radius * stripe);
            ctx.lineTo(enemy.radius * 0.52, enemy.radius * stripe);
            ctx.stroke();
          }

          ctx.fillStyle = "#f1d86c";
          ctx.beginPath();
          ctx.moveTo(0, -enemy.radius * 1.25);
          ctx.lineTo(-enemy.radius * 0.34, -enemy.radius * 0.72);
          ctx.lineTo(enemy.radius * 0.34, -enemy.radius * 0.72);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#17110b";
          ctx.beginPath();
          ctx.arc(-enemy.radius * 0.18, -enemy.radius * 0.5, enemy.radius * 0.07, 0, Math.PI * 2);
          ctx.arc(enemy.radius * 0.18, -enemy.radius * 0.5, enemy.radius * 0.07, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        } else if (enemy.type === "bird") {
          ctx.save();
          ctx.translate(x, y + wobble);
          const flap = Math.sin(enemy.pulse * 2.4) * enemy.radius * 0.12;

          ctx.fillStyle = "#5b6775";
          ctx.strokeStyle = "#242b33";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.ellipse(0, 5, enemy.radius * 0.9, enemy.radius * 0.64, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#495562";
          ctx.beginPath();
          ctx.ellipse(-enemy.radius * 0.7, 6 + flap, enemy.radius * 0.58, enemy.radius * 0.22, -0.45, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.ellipse(enemy.radius * 0.7, 6 - flap, enemy.radius * 0.58, enemy.radius * 0.22, 0.45, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#6f7d8b";
          ctx.beginPath();
          ctx.arc(0, -enemy.radius * 0.52, enemy.radius * 0.42, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#d8a236";
          ctx.beginPath();
          ctx.moveTo(0, -enemy.radius * 0.46);
          ctx.lineTo(-enemy.radius * 0.16, -enemy.radius * 0.2);
          ctx.lineTo(enemy.radius * 0.16, -enemy.radius * 0.2);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#101419";
          ctx.beginPath();
          ctx.arc(-enemy.radius * 0.15, -enemy.radius * 0.62, enemy.radius * 0.05, 0, Math.PI * 2);
          ctx.arc(enemy.radius * 0.15, -enemy.radius * 0.62, enemy.radius * 0.05, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        } else if (enemy.type === "mouse") {
          ctx.save();
          ctx.translate(x, y + wobble);

          ctx.fillStyle = "#c0b8aa";
          ctx.strokeStyle = "#3f3935";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.ellipse(0, 5, enemy.radius * 0.92, enemy.radius * 0.68, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#b4aa9c";
          ctx.beginPath();
          ctx.arc(0, -enemy.radius * 0.52, enemy.radius * 0.55, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#d6a9b3";
          ctx.beginPath();
          ctx.arc(-enemy.radius * 0.45, -enemy.radius * 0.9, enemy.radius * 0.25, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(enemy.radius * 0.45, -enemy.radius * 0.9, enemy.radius * 0.25, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#1f1b1b";
          ctx.beginPath();
          ctx.arc(-enemy.radius * 0.17, -enemy.radius * 0.58, enemy.radius * 0.06, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(enemy.radius * 0.17, -enemy.radius * 0.58, enemy.radius * 0.06, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#f0b5bd";
          ctx.beginPath();
          ctx.arc(0, -enemy.radius * 0.42, enemy.radius * 0.08, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "#7d746b";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(enemy.radius * 0.78, enemy.radius * 0.24);
          ctx.bezierCurveTo(enemy.radius * 1.38, enemy.radius * 0.28, enemy.radius * 1.45, enemy.radius * 0.88, enemy.radius * 0.95, enemy.radius * 1.05);
          ctx.stroke();
          ctx.restore();
        } else if (enemy.type === "ant") {
          ctx.save();
          ctx.translate(x, y + wobble);
          ctx.fillStyle = "#2c211c";
          ctx.strokeStyle = "#0f0b09";
          ctx.lineWidth = 1.8;

          ctx.beginPath();
          ctx.arc(0, -enemy.radius * 0.55, enemy.radius * 0.36, 0, Math.PI * 2);
          ctx.arc(0, 0, enemy.radius * 0.42, 0, Math.PI * 2);
          ctx.arc(0, enemy.radius * 0.58, enemy.radius * 0.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.strokeStyle = "#0f0b09";
          ctx.lineWidth = 1.5;
          for (let i = -1; i <= 1; i += 1) {
            ctx.beginPath();
            ctx.moveTo(-enemy.radius * 0.32, enemy.radius * i * 0.26);
            ctx.lineTo(-enemy.radius * 0.9, enemy.radius * (i * 0.28 + 0.14));
            ctx.moveTo(enemy.radius * 0.32, enemy.radius * i * 0.26);
            ctx.lineTo(enemy.radius * 0.9, enemy.radius * (i * 0.28 + 0.14));
            ctx.stroke();
          }

          ctx.beginPath();
          ctx.moveTo(-enemy.radius * 0.16, -enemy.radius * 0.84);
          ctx.lineTo(-enemy.radius * 0.48, -enemy.radius * 1.18);
          ctx.moveTo(enemy.radius * 0.16, -enemy.radius * 0.84);
          ctx.lineTo(enemy.radius * 0.48, -enemy.radius * 1.18);
          ctx.stroke();
          ctx.restore();
        } else if (enemy.type === "ladybug") {
          ctx.save();
          ctx.translate(x, y + wobble);
          ctx.fillStyle = "#d94e55";
          ctx.strokeStyle = "#241514";
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.ellipse(0, 2, enemy.radius * 0.86, enemy.radius * 0.9, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#25211f";
          ctx.beginPath();
          ctx.arc(0, -enemy.radius * 0.68, enemy.radius * 0.42, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(0, -enemy.radius * 0.35);
          ctx.lineTo(0, enemy.radius * 0.82);
          ctx.stroke();

          for (const spot of [[-0.34, -0.08], [0.34, -0.08], [-0.28, 0.34], [0.28, 0.34]]) {
            ctx.beginPath();
            ctx.arc(enemy.radius * spot[0], enemy.radius * spot[1], enemy.radius * 0.12, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        } else if (enemy.type === "cricket") {
          ctx.save();
          ctx.translate(x, y + wobble);
          ctx.fillStyle = "#6a9f42";
          ctx.strokeStyle = "#1b3219";
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.ellipse(0, 4, enemy.radius * 0.62, enemy.radius * 0.9, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#84bd55";
          ctx.beginPath();
          ctx.arc(0, -enemy.radius * 0.7, enemy.radius * 0.42, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.strokeStyle = "#1b3219";
          ctx.lineWidth = 2.2;
          ctx.beginPath();
          ctx.moveTo(-enemy.radius * 0.45, enemy.radius * 0.22);
          ctx.lineTo(-enemy.radius * 1.08, enemy.radius * 0.78);
          ctx.lineTo(-enemy.radius * 1.35, enemy.radius * 0.38);
          ctx.moveTo(enemy.radius * 0.45, enemy.radius * 0.22);
          ctx.lineTo(enemy.radius * 1.08, enemy.radius * 0.78);
          ctx.lineTo(enemy.radius * 1.35, enemy.radius * 0.38);
          ctx.moveTo(-enemy.radius * 0.2, -enemy.radius * 0.98);
          ctx.lineTo(-enemy.radius * 0.68, -enemy.radius * 1.42);
          ctx.moveTo(enemy.radius * 0.2, -enemy.radius * 0.98);
          ctx.lineTo(enemy.radius * 0.68, -enemy.radius * 1.42);
          ctx.stroke();
          ctx.restore();
        } else if (enemy.type === "spider") {
          ctx.save();
          ctx.translate(x, y + wobble);
          ctx.strokeStyle = "#17121a";
          ctx.lineWidth = 2.3;
          for (let i = -2; i <= 2; i += 1) {
            if (i === 0) continue;
            ctx.beginPath();
            ctx.moveTo(-enemy.radius * 0.42, enemy.radius * i * 0.12);
            ctx.lineTo(-enemy.radius * 1.08, enemy.radius * (i * 0.22));
            ctx.lineTo(-enemy.radius * 1.32, enemy.radius * (i * 0.22 + 0.28));
            ctx.moveTo(enemy.radius * 0.42, enemy.radius * i * 0.12);
            ctx.lineTo(enemy.radius * 1.08, enemy.radius * (i * 0.22));
            ctx.lineTo(enemy.radius * 1.32, enemy.radius * (i * 0.22 + 0.28));
            ctx.stroke();
          }

          ctx.fillStyle = "#4b3c4f";
          ctx.strokeStyle = "#17121a";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.ellipse(0, 3, enemy.radius * 0.82, enemy.radius * 0.76, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, -enemy.radius * 0.54, enemy.radius * 0.45, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#d8f0d2";
          ctx.beginPath();
          ctx.arc(-enemy.radius * 0.16, -enemy.radius * 0.62, enemy.radius * 0.08, 0, Math.PI * 2);
          ctx.arc(enemy.radius * 0.16, -enemy.radius * 0.62, enemy.radius * 0.08, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        } else {
          ctx.save();
          ctx.translate(x, y + wobble);

          ctx.fillStyle = enemy.type === "rhino" ? "#6a5546" : "#b84b46";
          ctx.strokeStyle = "#241514";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.ellipse(0, 3, enemy.radius * 0.82, enemy.radius * 0.92, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = enemy.type === "rhino" ? "#8b725f" : "#d06a55";
          ctx.beginPath();
          ctx.arc(0, -enemy.radius * 0.66, enemy.radius * 0.48, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          if (enemy.type === "rhino") {
            ctx.fillStyle = "#d6c5a0";
            ctx.strokeStyle = "#241514";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -enemy.radius * 1.55);
            ctx.lineTo(-enemy.radius * 0.2, -enemy.radius * 0.78);
            ctx.lineTo(enemy.radius * 0.2, -enemy.radius * 0.78);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
          }

          ctx.strokeStyle = "#241514";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, -enemy.radius * 1.04);
          ctx.lineTo(-enemy.radius * 0.32, -enemy.radius * 1.42);
          ctx.moveTo(0, -enemy.radius * 1.04);
          ctx.lineTo(enemy.radius * 0.32, -enemy.radius * 1.42);
          ctx.stroke();

          for (let i = -1; i <= 1; i += 1) {
            ctx.beginPath();
            ctx.moveTo(-enemy.radius * 0.62, enemy.radius * i * 0.22);
            ctx.lineTo(-enemy.radius * 1.08, enemy.radius * (i * 0.28 + 0.16));
            ctx.moveTo(enemy.radius * 0.62, enemy.radius * i * 0.22);
            ctx.lineTo(enemy.radius * 1.08, enemy.radius * (i * 0.28 + 0.16));
            ctx.stroke();
          }

          ctx.strokeStyle = "rgba(36, 21, 20, 0.5)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(0, -enemy.radius * 0.3);
          ctx.lineTo(0, enemy.radius * 0.82);
          ctx.stroke();
          ctx.restore();
        }

        const hpWidth = enemy.radius * 2;
        ctx.fillStyle = "rgba(0, 0, 0, 0.46)";
        ctx.fillRect(x - hpWidth / 2, y - enemy.radius - 13, hpWidth, 5);
        ctx.fillStyle = "#ef5c5c";
        ctx.fillRect(x - hpWidth / 2, y - enemy.radius - 13, hpWidth * Math.max(0, enemy.hp / enemy.maxHp), 5);
      }
    }

    function drawProjectiles() {
      for (const arrow of projectiles) {
        const x = screenX(arrow.x);
        const y = screenY(arrow.y);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(arrow.angle);
        ctx.fillStyle = "#e8d8a1";
        ctx.strokeStyle = "#533a26";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(14 * arrow.size, 0);
        ctx.lineTo(-10 * arrow.size, -4 * arrow.size);
        ctx.lineTo(-6 * arrow.size, 0);
        ctx.lineTo(-10 * arrow.size, 4 * arrow.size);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      for (const tadpole of tadpoles) {
        const x = screenX(tadpole.x);
        const y = screenY(tadpole.y);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(tadpole.angle + Math.sin(tadpole.wiggle) * 0.16);
        ctx.fillStyle = "#6fcf8e";
        ctx.strokeStyle = "#1f5b3d";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, 0, tadpole.radius * 1.08, tadpole.radius * 0.72, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "#4daa72";
        ctx.lineWidth = Math.max(2, tadpole.radius * 0.28);
        ctx.beginPath();
        ctx.moveTo(-tadpole.radius * 0.9, 0);
        ctx.quadraticCurveTo(-tadpole.radius * 1.55, Math.sin(tadpole.wiggle) * tadpole.radius * 0.42, -tadpole.radius * 2.15, 0);
        ctx.stroke();

        ctx.fillStyle = "#102516";
        ctx.beginPath();
        ctx.arc(tadpole.radius * 0.36, -tadpole.radius * 0.18, tadpole.radius * 0.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      for (const drop of raindrops) {
        const progress = 1 - clamp(drop.life / drop.maxLife, 0, 1);
        const x = screenX(drop.x);
        const y = screenY(drop.startY + (drop.y - drop.startY) * progress);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(drop.angle);
        ctx.strokeStyle = "#aeefff";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.lineTo(0, 12);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.78)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(0, -14);
        ctx.lineTo(0, 5);
        ctx.stroke();
        ctx.restore();
      }

      for (const banana of bananas) {
        const x = screenX(banana.x);
        const y = screenY(banana.y);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(banana.angle + Math.sin(banana.spin) * 0.55);
        if (bananaImage.complete && bananaImage.naturalWidth > 0) {
          const width = banana.radius * 4.8;
          const height = width * (bananaImage.naturalHeight / bananaImage.naturalWidth);
          ctx.drawImage(bananaImage, -width * 0.52, -height * 0.5, width, height);
        } else {
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.strokeStyle = "#7b5a16";
          ctx.lineWidth = Math.max(4, banana.radius * 0.62);
          ctx.beginPath();
          ctx.moveTo(-banana.radius * 0.9, banana.radius * 0.28);
          ctx.quadraticCurveTo(0, -banana.radius * 0.95, banana.radius * 1.05, banana.radius * 0.16);
          ctx.stroke();

          ctx.strokeStyle = "#f4d64d";
          ctx.lineWidth = Math.max(3, banana.radius * 0.44);
          ctx.beginPath();
          ctx.moveTo(-banana.radius * 0.78, banana.radius * 0.18);
          ctx.quadraticCurveTo(0, -banana.radius * 0.72, banana.radius * 0.85, banana.radius * 0.08);
          ctx.stroke();

          ctx.fillStyle = "#5b3e12";
          ctx.beginPath();
          ctx.arc(-banana.radius * 0.86, banana.radius * 0.25, banana.radius * 0.14, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(banana.radius * 0.96, banana.radius * 0.12, banana.radius * 0.12, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      for (const wave of shockWaves) {
        const x = screenX(wave.x);
        const y = screenY(wave.y);
        const age = 1 - clamp(wave.life / wave.maxLife, 0, 1);
        const alpha = clamp(wave.life / 0.32, 0, 1);
        const wobble = Math.sin(wave.phase) * wave.thickness * 0.18;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(wave.angle);
        ctx.lineCap = "round";
        ctx.strokeStyle = `rgba(255, 239, 82, ${0.86 * alpha})`;
        ctx.lineWidth = wave.thickness;
        ctx.beginPath();
        ctx.arc(0, wobble, wave.radius, -wave.arc / 2, wave.arc / 2);
        ctx.stroke();

        ctx.strokeStyle = `rgba(255, 255, 190, ${0.62 * alpha})`;
        ctx.lineWidth = Math.max(2, wave.thickness * 0.34);
        ctx.beginPath();
        ctx.arc(0, wobble, wave.radius + wave.thickness * 0.18, -wave.arc / 2, wave.arc / 2);
        ctx.stroke();

        ctx.strokeStyle = `rgba(255, 197, 39, ${0.28 * alpha})`;
        ctx.lineWidth = Math.max(2, wave.thickness * 0.28);
        ctx.beginPath();
        ctx.arc(0, wobble, wave.radius - wave.thickness * (0.75 + age * 0.2), -wave.arc / 2, wave.arc / 2);
        ctx.stroke();
        ctx.restore();
      }

      for (const shot of enemyProjectiles) {
        const x = screenX(shot.x);
        const y = screenY(shot.y);
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = "#f2d7a6";
        ctx.strokeStyle = "#6b4930";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, shot.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "rgba(255, 245, 210, 0.7)";
        ctx.beginPath();
        ctx.arc(-shot.radius * 0.25, -shot.radius * 0.25, shot.radius * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawLasers() {
      for (const laser of lasers) {
        const alpha = clamp(laser.life / laser.maxLife, 0, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#74f2ff";
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(screenX(laser.x1), screenY(laser.y1));
        ctx.lineTo(screenX(laser.x2), screenY(laser.y2));
        ctx.stroke();

        ctx.strokeStyle = "#f9ffff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(screenX(laser.x1), screenY(laser.y1));
        ctx.lineTo(screenX(laser.x2), screenY(laser.y2));
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawTongues() {
      for (const tongue of tongues) {
        const target = enemyById.get(tongue.targetId);
        if (!target) continue;
        const alpha = clamp(tongue.life / tongue.maxLife, 0, 1);
        const wiggle = Math.sin(tongue.phase) * 8;
        const x1 = screenX(player.x);
        const y1 = screenY(player.y);
        const x2 = screenX(target.x);
        const y2 = screenY(target.y);
        const midX = (x1 + x2) / 2;
        const midY = (y1 + y2) / 2;
        const angle = Math.atan2(y2 - y1, x2 - x1) + Math.PI / 2;
        const controlX = midX + Math.cos(angle) * wiggle;
        const controlY = midY + Math.sin(angle) * wiggle;

        ctx.save();
        ctx.globalAlpha = 0.45 + alpha * 0.45;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "#8f1d28";
        ctx.lineWidth = tongueWeapon.width + 8;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(controlX, controlY, x2, y2);
        ctx.stroke();

        ctx.strokeStyle = "#e34255";
        ctx.lineWidth = tongueWeapon.width;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(controlX, controlY, x2, y2);
        ctx.stroke();

        ctx.fillStyle = "#ff7885";
        ctx.beginPath();
        ctx.arc(x2, y2, tongueWeapon.width * 0.42, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawSlashes() {
      for (const slash of slashes) {
        const alpha = clamp(slash.life / slash.maxLife, 0, 1);
        const x = screenX(slash.x);
        const y = screenY(slash.y);
        const inner = Math.max(22, slash.range * 0.38);
        const outer = slash.range;
        const start = slash.angle - slash.arc / 2;
        const end = slash.angle + slash.arc / 2;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "rgba(255, 235, 160, 0.18)";
        ctx.strokeStyle = "rgba(255, 248, 215, 0.9)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, y, outer, start, end);
        ctx.arc(x, y, inner, end, start, true);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "rgba(245, 176, 82, 0.95)";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(x, y, outer - 6, start + 0.06, end - 0.06);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawAsteroids() {
      for (const asteroid of asteroids) {
        const alpha = clamp(Math.min(asteroid.life, 0.45) / 0.45, 0, 1);
        const x = screenX(player.x + Math.cos(asteroid.angle) * asteroid.orbitRadius);
        const y = screenY(player.y + Math.sin(asteroid.angle) * asteroid.orbitRadius);
        const spin = world.time * 4 + asteroid.angle;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(x, y);
        ctx.rotate(spin);

        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.beginPath();
        ctx.ellipse(0, asteroid.radius * 0.9, asteroid.radius * 0.9, asteroid.radius * 0.28, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#8f8a7a";
        ctx.strokeStyle = "#efe0b4";
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < 8; i += 1) {
          const pointAngle = (Math.PI * 2 * i) / 8;
          const r = asteroid.radius * (i % 2 === 0 ? 1 : 0.72);
          const px = Math.cos(pointAngle) * r;
          const py = Math.sin(pointAngle) * r;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "rgba(42, 37, 30, 0.45)";
        ctx.beginPath();
        ctx.arc(-asteroid.radius * 0.2, -asteroid.radius * 0.16, asteroid.radius * 0.18, 0, Math.PI * 2);
        ctx.arc(asteroid.radius * 0.28, asteroid.radius * 0.22, asteroid.radius * 0.14, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawLightningOrbs() {
      for (const orb of lightningOrbs) {
        const x = screenX(orb.x);
        const y = screenY(orb.y);
        const flicker = Math.sin(orb.phase) * 0.08 + 1;

        ctx.save();
        ctx.translate(x, y);
        ctx.globalAlpha = 0.26;
        ctx.fillStyle = "#ffe86a";
        ctx.beginPath();
        ctx.arc(0, 0, orb.radius * 1.75 * flicker, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
        ctx.fillStyle = "#ffd83d";
        ctx.strokeStyle = "#fff6b0";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, orb.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "#fffce0";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        for (let i = 0; i < 4; i += 1) {
          const angle = orb.phase + i * Math.PI * 0.5;
          ctx.beginPath();
          ctx.moveTo(Math.cos(angle) * orb.radius * 0.25, Math.sin(angle) * orb.radius * 0.25);
          ctx.lineTo(Math.cos(angle + 0.3) * orb.radius * 0.62, Math.sin(angle + 0.3) * orb.radius * 0.62);
          ctx.lineTo(Math.cos(angle - 0.2) * orb.radius * 0.95, Math.sin(angle - 0.2) * orb.radius * 0.95);
          ctx.stroke();
        }

        ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
        ctx.beginPath();
        ctx.arc(-orb.radius * 0.28, -orb.radius * 0.32, orb.radius * 0.22, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawEnergyRing() {
      if (!energyRing.unlocked) return;
      const x = screenX(player.x);
      const y = screenY(player.y);
      const pulse = 1 + Math.sin(world.time * 5) * 0.018;

      ctx.save();
      ctx.translate(x, y);
      ctx.globalAlpha = 0.16;
      ctx.fillStyle = "#6ee7ff";
      ctx.beginPath();
      ctx.arc(0, 0, energyRing.radius * pulse, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 0.55;
      ctx.strokeStyle = "#b8f7ff";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, energyRing.radius * pulse, 0, Math.PI * 2);
      ctx.stroke();

      ctx.globalAlpha = 0.32;
      ctx.strokeStyle = "#5bd4ff";
      ctx.lineWidth = 2;
      ctx.setLineDash([12, 16]);
      ctx.lineDashOffset = -world.time * 42;
      ctx.beginPath();
      ctx.arc(0, 0, energyRing.radius * 0.92 * pulse, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawSkyLasers() {
      if (!skyLaser.unlocked) return;
      for (const beam of skyLasers) {
        const target = enemyById.get(beam.targetId);
        if (!target) continue;
        const x = screenX(target.x);
        const y = screenY(target.y);
        const flicker = 1 + Math.sin(beam.shimmer) * 0.14;

        ctx.save();
        ctx.globalAlpha = 0.22;
        ctx.strokeStyle = "#fff7b8";
        ctx.lineWidth = 26 * flicker;
        ctx.beginPath();
        ctx.moveTo(x, -30);
        ctx.lineTo(x, y);
        ctx.stroke();

        ctx.globalAlpha = 0.72;
        ctx.strokeStyle = "#ffe55e";
        ctx.lineWidth = 10 * flicker;
        ctx.beginPath();
        ctx.moveTo(x, -30);
        ctx.lineTo(x, y);
        ctx.stroke();

        ctx.globalAlpha = 1;
        ctx.strokeStyle = "#fffdf0";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x, -30);
        ctx.lineTo(x, y);
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 232, 86, 0.35)";
        ctx.beginPath();
        ctx.arc(x, y, target.radius * 1.35 * flicker, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawMines() {
      for (const mine of mines) {
        const x = screenX(mine.x);
        const y = screenY(mine.y);
        const blink = mine.armed > 0 ? 0.35 : 0.75 + Math.sin(mine.pulse) * 0.2;

        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = "rgba(0, 0, 0, 0.28)";
        ctx.beginPath();
        ctx.ellipse(0, mine.radius * 0.38, mine.radius * 0.95, mine.radius * 0.34, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#777b7b";
        ctx.strokeStyle = "#232828";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, mine.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "#4b5050";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, mine.radius * 0.58, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = `rgba(255, 75, 58, ${blink})`;
        ctx.beginPath();
        ctx.arc(0, 0, Math.max(3, mine.radius * 0.18), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      for (const explosion of explosions) {
        const alpha = clamp(explosion.life / explosion.maxLife, 0, 1);
        const x = screenX(explosion.x);
        const y = screenY(explosion.y);
        const radius = explosion.radius * (1.25 - alpha * 0.25);

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = explosion.color ? "rgba(135, 215, 179, 0.26)" : "rgba(255, 169, 62, 0.24)";
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = explosion.color || "#ffd072";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(x, y, radius * 0.72, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawGems() {
      for (const gem of gems) {
        const x = screenX(gem.x);
        const y = screenY(gem.y) + Math.sin(gem.bob) * 4;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Math.PI / 4);
        ctx.fillStyle = "#42d2ff";
        ctx.strokeStyle = "#d9fbff";
        ctx.lineWidth = 2;
        ctx.fillRect(-gem.radius / 1.5, -gem.radius / 1.5, gem.radius * 1.35, gem.radius * 1.35);
        ctx.strokeRect(-gem.radius / 1.5, -gem.radius / 1.5, gem.radius * 1.35, gem.radius * 1.35);
        ctx.restore();
      }
    }

    function drawHearts() {
      for (const heart of hearts) {
        const x = screenX(heart.x);
        const y = screenY(heart.y) + Math.sin(heart.bob) * 5;
        const size = heart.radius;

        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = "rgba(0, 0, 0, 0.22)";
        ctx.beginPath();
        ctx.ellipse(0, size * 0.75, size * 0.8, size * 0.28, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#f05464";
        ctx.strokeStyle = "#ffd1d6";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, size * 0.75);
        ctx.bezierCurveTo(-size * 1.45, -size * 0.15, -size * 0.72, -size * 1.1, 0, -size * 0.42);
        ctx.bezierCurveTo(size * 0.72, -size * 1.1, size * 1.45, -size * 0.15, 0, size * 0.75);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawPuddles() {
      for (const puddle of puddles) {
        const alpha = clamp(puddle.life / puddle.maxLife, 0, 1);
        const x = screenX(puddle.x);
        const y = screenY(puddle.y);
        const pulse = Math.sin(puddle.ripple) * puddle.radius * 0.04;

        ctx.save();
        ctx.globalAlpha = 0.22 + alpha * 0.38;
        ctx.fillStyle = "#5ab9d6";
        ctx.strokeStyle = "rgba(178, 239, 247, 0.75)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(x, y, puddle.radius + pulse, puddle.radius * 0.58 + pulse * 0.35, Math.sin(puddle.ripple * 0.5) * 0.18, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.globalAlpha = 0.18 + alpha * 0.22;
        ctx.strokeStyle = "#d2fbff";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(x - puddle.radius * 0.18, y - puddle.radius * 0.06, puddle.radius * 0.42, puddle.radius * 0.16, -0.16, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawFloatText() {
      ctx.font = "700 14px Inter, system-ui, sans-serif";
      ctx.textAlign = "center";
      for (const item of floatText) {
        ctx.globalAlpha = clamp(item.life * 2, 0, 1);
        ctx.fillStyle = item.heal ? "#64f58e" : item.danger ? "#ff8a7a" : item.text === "+EXP" ? "#83e4ff" : "#fff1a9";
        ctx.fillText(item.text, screenX(item.x), screenY(item.y));
      }
      ctx.globalAlpha = 1;
    }

    function draw() {
      drawGround();
      drawPuddles();
      drawGems();
      drawHearts();
      drawMines();
      drawEnergyRing();
      drawSkyLasers();
      drawLasers();
      drawTongues();
      drawSlashes();
      drawAsteroids();
      drawLightningOrbs();
      drawProjectiles();
      drawEnemies();
      drawPlayer();
      drawFloatText();
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("resize", resize);
    window.addEventListener("keydown", (event) => {
      keys.add(event.code);
      if (event.code === "Space" && ui.levelUp.classList.contains("show")) {
        const first = ui.upgradeGrid.querySelector("button");
        if (first) first.click();
      }
    });
    window.addEventListener("keyup", (event) => keys.delete(event.code));

    canvas.addEventListener("pointerdown", (event) => {
      pointer.active = true;
      pointer.id = event.pointerId;
      pointer.startX = event.clientX;
      pointer.startY = event.clientY;
      pointer.dx = 0;
      pointer.dy = 0;
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!pointer.active || pointer.id !== event.pointerId) return;
      const rawX = event.clientX - pointer.startX;
      const rawY = event.clientY - pointer.startY;
      const length = Math.hypot(rawX, rawY);
      const max = 40;
      pointer.dx = length > 0 ? rawX / Math.max(max, length) : 0;
      pointer.dy = length > 0 ? rawY / Math.max(max, length) : 0;
      ui.touchStick.style.setProperty("--stick-x", `${clamp(rawX, -max, max)}px`);
      ui.touchStick.style.setProperty("--stick-y", `${clamp(rawY, -max, max)}px`);
    });

    canvas.addEventListener("pointerup", endPointer);
    canvas.addEventListener("pointercancel", endPointer);
    ui.restart.addEventListener("click", restartRun);

    function endPointer(event) {
      if (pointer.id !== event.pointerId) return;
      pointer.active = false;
      pointer.id = null;
      pointer.dx = 0;
      pointer.dy = 0;
      ui.touchStick.style.setProperty("--stick-x", "0px");
      ui.touchStick.style.setProperty("--stick-y", "0px");
    }

    resize();
    updateUi();
    for (let i = 0; i < 6; i += 1) spawnEnemy();
    openUpgradeChoice();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
