<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frog Survivor</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101417;
      color: #f4f2eb;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 25% 20%, rgba(74, 115, 80, 0.28), transparent 30%),
        linear-gradient(135deg, #0e1d1b 0%, #162c23 55%, #0b1615 100%);
    }

    body {
      display: grid;
      place-items: stretch;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: auto;
      touch-action: none;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #f4f2eb;
    }

    .top-bar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.45);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      min-width: 84px;
      padding: 8px 11px;
      border: 1px solid rgba(244, 242, 235, 0.16);
      border-radius: 8px;
      background: rgba(10, 13, 14, 0.58);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(8px);
    }

    .pill[hidden] {
      display: none;
    }

    .pill.weapon {
      min-width: 48px;
      padding: 5px 7px;
    }

    .pill small {
      display: block;
      margin-bottom: 2px;
      color: #cad5c2;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill.weapon small {
      font-size: 9px;
      margin-bottom: 0;
      letter-spacing: 0.05em;
    }

    .pill.weapon span {
      font-size: 13px;
      font-weight: 800;
    }

    .help {
      max-width: min(320px, 48vw);
      padding: 8px 11px;
      border-radius: 8px;
      background: rgba(10, 13, 14, 0.48);
      color: #dce1d5;
      font-size: 13px;
      line-height: 1.35;
      text-align: right;
    }

    .xp-wrap {
      position: absolute;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      height: 24px;
      overflow: hidden;
      border: 2px solid rgba(244, 242, 235, 0.48);
      border-radius: 8px;
      background: rgba(5, 9, 10, 0.72);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.42);
    }

    .xp-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #3acb7d 0%, #76d86c 44%, #e9ce5d 100%);
      box-shadow: 0 0 18px rgba(118, 216, 108, 0.5);
      transition: width 120ms linear;
    }

    .xp-label {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #f8faef;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-shadow: 0 1px 4px #000;
    }

    .level-up {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(5, 8, 9, 0.66);
      pointer-events: auto;
    }

    .level-up.show {
      display: flex;
    }

    .upgrade-panel {
      width: min(920px, 100%);
      padding: 20px;
      border: 1px solid rgba(244, 242, 235, 0.24);
      border-radius: 8px;
      background: rgba(20, 27, 26, 0.96);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.5);
    }

    .upgrade-panel h1 {
      margin: 0 0 4px;
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 0;
    }

    .upgrade-panel p {
      margin: 0 0 18px;
      color: #cfd8c8;
    }

    .upgrade-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .upgrade {
      min-height: 184px;
      padding: 16px;
      border: 1px solid rgba(244, 242, 235, 0.18);
      border-radius: 8px;
      background: #202b27;
      color: #f4f2eb;
      text-align: left;
      cursor: pointer;
      transition: transform 130ms ease, border-color 130ms ease, background 130ms ease;
    }

    .upgrade:hover,
    .upgrade:focus-visible {
      outline: 0;
      transform: translateY(-3px);
      border-color: #e9ce5d;
      background: #263831;
    }

    .upgrade strong {
      display: block;
      margin-bottom: 8px;
      font-size: 20px;
    }

    .upgrade span {
      color: #d3ddcf;
      font-size: 14px;
      line-height: 1.45;
    }

    .touch-stick {
      position: fixed;
      left: 24px;
      bottom: 62px;
      display: none;
      width: 112px;
      height: 112px;
      border: 1px solid rgba(244, 242, 235, 0.15);
      border-radius: 50%;
      background: rgba(10, 13, 14, 0.36);
      pointer-events: none;
    }

    .touch-stick::after {
      content: "";
      position: absolute;
      left: 38px;
      top: 38px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(244, 242, 235, 0.7);
      transform: translate(var(--stick-x, 0), var(--stick-y, 0));
    }

    @media (max-width: 720px) {
      .top-bar {
        top: 10px;
        left: 10px;
        right: 10px;
      }

      .help {
        display: none;
      }

      .pill {
        min-width: 72px;
        padding: 7px 9px;
      }

      .pill.weapon {
        min-width: 44px;
        padding: 5px 6px;
      }

      .upgrade-grid {
        grid-template-columns: 1fr;
      }

      .upgrade {
        min-height: 126px;
      }

      .touch-stick {
        display: block;
      }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Frog Survivor game"></canvas>

  <div class="hud">
    <div class="top-bar">
      <div class="stats">
        <div class="pill"><small>Level</small><span id="level">1</span></div>

        <div class="pill"><small>Kills</small><span id="kills">0</span></div>
        <div class="pill weapon" id="weaponPill" hidden><small>Bow</small><span id="weapon">-</span></div>
        <div class="pill weapon" id="wandPill" hidden><small>Wand</small><span id="wand">-</span></div>
        <div class="pill weapon" id="swordPill" hidden><small>Sword</small><span id="sword">-</span></div>
        <div class="pill weapon" id="beltPill" hidden><small>Belt</small><span id="belt">-</span></div>
        <div class="pill weapon" id="orbPill" hidden><small>Orb</small><span id="orb">-</span></div>
        <div class="pill weapon" id="ringPill" hidden><small>Ring</small><span id="ring">-</span></div>
        <div class="pill weapon" id="skyPill" hidden><small>Sky</small><span id="sky">-</span></div>
        <div class="pill weapon" id="minePill" hidden><small>Mine</small><span id="mine">-</span></div>
        <div class="pill weapon" id="tadpolePill" hidden><small>Tad</small><span id="tadpole">-</span></div>
        <div class="pill weapon" id="tonguePill" hidden><small>Tongue</small><span id="tongue">-</span></div>
        <div class="pill weapon" id="puddlePill" hidden><small>Puddle</small><span id="puddle">-</span></div>
        <div class="pill weapon" id="rainPill" hidden><small>Rain</small><span id="rain">-</span></div>
        <div class="pill weapon" id="bananaPill" hidden><small>Banana</small><span id="banana">-</span></div>
        <div class="pill weapon" id="shockPill" hidden><small>Shock</small><span id="shock">-</span></div>
      </div>
      <div class="help">Move with WASD or arrow keys. Weapons attack nearby enemies automatically.</div>
    </div>

    <div class="xp-wrap">
      <div class="xp-fill" id="xpFill"></div>
      <div class="xp-label" id="xpLabel">EXP 0 / 8</div>
    </div>

    <div class="touch-stick" id="touchStick"></div>
  </div>

  <div class="level-up" id="levelUp">
    <div class="upgrade-panel">
      <h1 id="upgradeTitle">Choose an upgrade</h1>
      <p id="upgradeSubtitle">The world pauses while you sharpen the build.</p>
      <div class="upgrade-grid" id="upgradeGrid"></div>
    </div>
  </div>

  <div class="level-up" id="gameOver">
    <div class="upgrade-panel">
      <h1>Run ended</h1>
      <p id="runSummary">You were overrun.</p>
      <div class="upgrade-grid">
        <button class="upgrade" id="restart" type="button">
          <strong>Try again</strong>
          <span>Start a fresh run with the basic crossbow.</span>
        </button>
      </div>
    </div>
  </div>

    function resize() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function distanceSq(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return dx * dx + dy * dy;
    }

    function distanceToSegmentSq(point, a, b) {
      const abx = b.x - a.x;
      const aby = b.y - a.y;
      const lengthSq = abx * abx + aby * aby || 1;
      const t = clamp(((point.x - a.x) * abx + (point.y - a.y) * aby) / lengthSq, 0, 1);
      const x = a.x + abx * t;
      const y = a.y + aby * t;
      const dx = point.x - x;
      const dy = point.y - y;
      return dx * dx + dy * dy;
    }

    function rebuildSpatialGrid() {
      spatial.cells.clear();
      for (const enemy of enemies) {
        if (enemy.dead) continue;
        const cx = Math.floor(enemy.x / spatial.cellSize);
        const cy = Math.floor(enemy.y / spatial.cellSize);
        const key = `${cx},${cy}`;
        let cell = spatial.cells.get(key);
        if (!cell) {
          cell = [];
          spatial.cells.set(key, cell);
        }
        cell.push(enemy);
      }
    }

    function nearbyEnemies(x, y, range) {
      const minX = Math.floor((x - range) / spatial.cellSize);
      const maxX = Math.floor((x + range) / spatial.cellSize);
      const minY = Math.floor((y - range) / spatial.cellSize);
      const maxY = Math.floor((y + range) / spatial.cellSize);
      const found = [];
      for (let cy = minY; cy <= maxY; cy += 1) {
        for (let cx = minX; cx <= maxX; cx += 1) {
          const cell = spatial.cells.get(`${cx},${cy}`);
          if (cell) found.push(...cell);
        }
      }
      return found;
    }

    function angleDifference(a, b) {
      return Math.atan2(Math.sin(a - b), Math.cos(a - b));
    }

    function randomEdgePosition() {
      const margin = 90;
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;
      const side = Math.floor(Math.random() * 4);
      const minX = world.cameraX - margin;
      const maxX = world.cameraX + screenW + margin;
      const minY = world.cameraY - margin;
      const maxY = world.cameraY + screenH + margin;

      if (side === 0) return { x: clamp(minX, 0, world.width), y: clamp(minY + Math.random() * (screenH + margin * 2), 0, world.height) };
      if (side === 1) return { x: clamp(maxX, 0, world.width), y: clamp(minY + Math.random() * (screenH + margin * 2), 0, world.height) };
      if (side === 2) return { x: clamp(minX + Math.random() * (screenW + margin * 2), 0, world.width), y: clamp(minY, 0, world.height) };
      return { x: clamp(minX + Math.random() * (screenW + margin * 2), 0, world.width), y: clamp(maxY, 0, world.height) };
    }

    function randomScreenPosition(padding = 80) {
      return {
        x: clamp(world.cameraX + padding + Math.random() * Math.max(1, window.innerWidth - padding * 2), padding, world.width - padding),
        y: clamp(world.cameraY + padding + Math.random() * Math.max(1, window.innerHeight - padding * 2), padding, world.height - padding),
      };
    }

          color: "#4b3c4f",
        },
      }[type];

      const enemy = {
        id: nextEnemyId,
        x: pos.x,
        y: pos.y,
        radius: stats.radius,
        hp: stats.hp,
        maxHp: stats.hp,
        speed: stats.speed,
        damage: stats.damage,
        color: stats.color,
        type,
        pulse: Math.random() * Math.PI * 2,
        dead: false,
      };
      enemies.push(enemy);
      enemyById.set(enemy.id, enemy);
      nextEnemyId += 1;
    }

    function averageNonBossHp(fallback = 80 + world.time * 0.6) {
      const living = enemies.filter((enemy) => !enemy.dead && !enemy.isBoss);
      return living.length
        ? living.reduce((sum, enemy) => sum + enemy.maxHp, 0) / living.length
        : fallback;
    }

    function addEnemy(enemy) {
      enemies.push(enemy);
      enemyById.set(enemy.id, enemy);
      nextEnemyId += 1;
    }

    function makeBossBase(type, pos, radius, hp, speed, damage, color) {
      return {
        id: nextEnemyId,
        x: pos.x,
        y: pos.y,
        radius,
        hp,
        maxHp: hp,
        speed,
        damage,
        color,
        type,
        isBoss: true,
        pulse: Math.random() * Math.PI * 2,
        dead: false,
      };
    }

    function spawnBoss() {
      if (enemies.some((enemy) => enemy.isBoss && !enemy.dead)) return;
      const pos = randomEdgePosition();
      const averageHp = averageNonBossHp();
      const mouseHp = Math.max(780, averageHp * 12);
      const bossTypes = ["mouse", "queenBee", "bird"];
      const type = bossTypes[Math.floor(Math.random() * bossTypes.length)];

      const stats = {
        mouse: {
          radius: 34,
          hp: mouseHp,
          speed: 20 + Math.min(18, world.time / 90),

          color: "#9d9487",

          radius: 38,

          speed: 24 + Math.min(14, world.time / 110),
          damage: 20,
          color: "#d9b232",
        },
        bird: {
          radius: 48,
          hp: mouseHp * 4,
          speed: 18 + Math.min(10, world.time / 130),
          damage: 30,
          color: "#5b6775",
        },
      }[type];
      const boss = makeBossBase(type, pos, stats.radius, stats.hp, stats.speed, stats.damage, stats.color);
      if (type === "mouse") boss.shotTimer = 1.2;
      if (type === "queenBee") boss.spawnTimer = 2.2;
      addEnemy(boss);
      floatText.push({ x: boss.x, y: boss.y - 28, text: type === "queenBee" ? "QUEEN BEE" : type.toUpperCase(), life: 1.1, danger: true });
    }

    function spawnAntSwarm() {
      const averageHp = averageNonBossHp(45 + world.time * 0.25);
      const count = 76 + Math.min(84, Math.floor(world.time / 26));
      const antHp = Math.max(28, averageHp * 0.65);

      for (let i = 0; i < count; i += 1) {
        const side = i % 4;
        const margin = 120 + Math.random() * 170;
        let x = world.cameraX + Math.random() * window.innerWidth;
        let y = world.cameraY + Math.random() * window.innerHeight;
        if (side === 0) y = world.cameraY - margin;
        if (side === 1) x = world.cameraX + window.innerWidth + margin;
        if (side === 2) y = world.cameraY + window.innerHeight + margin;
        if (side === 3) x = world.cameraX - margin;
        x += (Math.random() - 0.5) * 160;
        y += (Math.random() - 0.5) * 160;
        const ant = {
          id: nextEnemyId,
          x: clamp(x, 0, world.width),
          y: clamp(y, 0, world.height),

    function spawnHeart() {
      if (hearts.length >= 4 || player.hp >= player.maxHp) return;
      const pos = randomScreenPosition(120);
      hearts.push({

    function getMoveVector() {
      let x = 0;
      let y = 0;
      if (keys.has("KeyA") || keys.has("ArrowLeft")) x -= 1;
      if (keys.has("KeyD") || keys.has("ArrowRight")) x += 1;
      if (keys.has("KeyW") || keys.has("ArrowUp")) y -= 1;
      if (keys.has("KeyS") || keys.has("ArrowDown")) y += 1;

      if (pointer.active) {
        x += pointer.dx;
        y += pointer.dy;
      }

      const length = Math.hypot(x, y) || 1;
      return { x: x / length, y: y / length, moving: x !== 0 || y !== 0 };
    }

    function findTarget(range = crossbow.range, ignored = new Set()) {
      let best = null;
      let bestDist = range * range;
      for (const enemy of nearbyEnemies(player.x, player.y, range)) {
        if (enemy.dead || ignored.has(enemy.id)) continue;
        const d = distanceSq(player, enemy);
        if (d < bestDist) {
          best = enemy;
          bestDist = d;
        }
      }
      return best;
    }

    function fireCrossbow() {
      const target = findTarget();
      if (!target) return;

      const baseAngle = Math.atan2(target.y - player.y, target.x - player.x);
      const spread = Math.min(0.62, 0.12 * (crossbow.projectileCount - 1));
      for (let i = 0; i < crossbow.projectileCount; i += 1) {
        const offset = crossbow.projectileCount === 1
          ? 0
          : -spread / 2 + (spread * i) / (crossbow.projectileCount - 1);
        const angle = baseAngle + offset;
        projectiles.push({
          x: player.x + Math.cos(angle) * 24,
          y: player.y + Math.sin(angle) * 24,
          vx: Math.cos(angle) * crossbow.projectileSpeed,
          vy: Math.sin(angle) * crossbow.projectileSpeed,
          radius: 5 * crossbow.size,
          size: crossbow.size,
          damage: crossbow.damage,
          pierceLeft: crossbow.pierce,
          hitIds: new Set(),
          life: crossbow.range / crossbow.projectileSpeed,
          angle,
        });
      }
    }

    function fireWand() {
      if (!wand.unlocked) return;
      let origin = { x: player.x, y: player.y };
      const hitIds = new Set();
      let target = findTarget(wand.range, hitIds);
      let jumps = wand.ricochet;

      while (target) {
        target.hp -= wand.damage;
        hitIds.add(target.id);
        lasers.push({
          x1: origin.x,
          y1: origin.y,
          x2: target.x,
          y2: target.y,
          life: 0.16,
          maxLife: 0.16,
        });
        floatText.push({ x: target.x, y: target.y - target.radius, text: Math.round(wand.damage), life: 0.35 });
        const defeated = target.hp <= 0;
        if (defeated) killEnemy(target);
        if (jumps <= 0) break;

        origin = { x: target.x, y: target.y };
        jumps -= 1;

        let next = null;
        let nextDist = 280 * 280;
        for (const enemy of nearbyEnemies(origin.x, origin.y, 280)) {
          if (enemy.dead || hitIds.has(enemy.id)) continue;
          const d = distanceSq(enemy, origin);
          if (d < nextDist) {
            next = enemy;
            nextDist = d;
          }
        }
        target = next;
      }
    }

    function fireSword() {
      if (!sword.unlocked) return;
      const firstTarget = findTarget(sword.range + 45);
      const baseAngle = firstTarget
        ? Math.atan2(firstTarget.y - player.y, firstTarget.x - player.x)
        : world.time * 2.4;
      const spacing = Math.min(Math.PI * 0.7, sword.arc * 0.55);
      const hitIds = new Set();

      for (let i = 0; i < sword.slashCount; i += 1) {
        const offset = sword.slashCount === 1
          ? 0
          : -spacing / 2 + (spacing * i) / (sword.slashCount - 1);
        const angle = baseAngle + offset;
        slashes.push({
          x: player.x,
          y: player.y,
          angle,
          range: sword.range,
          arc: sword.arc,
          life: 0.22,
          maxLife: 0.22,
        });

        for (const enemy of nearbyEnemies(player.x, player.y, sword.range + 34)) {
          if (enemy.dead || hitIds.has(enemy.id)) continue;
          const hitRange = sword.range + enemy.radius;
          const d = distanceSq(player, enemy);
          if (d > hitRange * hitRange) continue;
          const enemyAngle = Math.atan2(enemy.y - player.y, enemy.x - player.x);
          if (Math.abs(angleDifference(enemyAngle, angle)) <= sword.arc / 2) {
            enemy.hp -= sword.damage;
            hitIds.add(enemy.id);
            floatText.push({ x: enemy.x, y: enemy.y - enemy.radius, text: Math.round(sword.damage), life: 0.45 });
            if (enemy.hp <= 0) killEnemy(enemy);
          }
        }
      }
    }

    function createLightningOrb(index = 0) {
      const targetAngle = enemies.length
        ? Math.atan2(enemies[0].y - player.y, enemies[0].x - player.x)
        : Math.random() * Math.PI * 2;
      const angle = targetAngle + index * Math.PI * 0.72;

      return {
        x: player.x,
        y: player.y,
        vx: Math.cos(angle) * lightningOrb.speed,
        vy: Math.sin(angle) * lightningOrb.speed,
        radius: lightningOrb.size,

      };

    function syncLightningOrbs(count = lightningOrb.count) {
      if (!lightningOrb.unlocked) return;
      lightningOrb.count = Math.max(1, count);
      while (lightningOrbs.length < lightningOrb.count) {
        lightningOrbs.push(createLightningOrb(lightningOrbs.length));
      }
      while (lightningOrbs.length > lightningOrb.count) lightningOrbs.pop();
    }

    function randomEnemy(excludeIds = new Set()) {
      const choices = enemies.filter((enemy) => !excludeIds.has(enemy.id));
      if (!choices.length) return null;
      return choices[Math.floor(Math.random() * choices.length)];
    }

    function randomVisibleEnemy(excludeIds = new Set()) {
      const margin = 80;
      const choices = enemies.filter((enemy) => {
        if (enemy.dead || excludeIds.has(enemy.id)) return false;
        return enemy.x >= world.cameraX - margin
          && enemy.x <= world.cameraX + window.innerWidth + margin
          && enemy.y >= world.cameraY - margin
          && enemy.y <= world.cameraY + window.innerHeight + margin;
      });
      if (!choices.length) return randomEnemy(excludeIds);
      return choices[Math.floor(Math.random() * choices.length)];
    }

    function gainXp(amount) {
      player.xp += amount;
      while (player.xp >= player.xpNeeded) {
        player.xp -= player.xpNeeded;
        player.level += 1;
        player.xpNeeded = Math.floor(player.xpNeeded * 1.28 + 5);
        world.pendingUpgrades += 1;
      }
      if (!world.paused && world.pendingUpgrades > 0) openUpgradeChoice();
      updateUi();
    }

    function killEnemy(enemy) {
      if (!enemy || enemy.dead) return;
      enemy.dead = true;
      enemyById.delete(enemy.id);
      const index = enemies.indexOf(enemy);
      if (index >= 0) enemies.splice(index, 1);
      player.kills += 1;
      const expValues = {
        fly: 2,
        dragonfly: 3,
        ladybug: 4,
        bug: 5,
        cricket: 6,
        rhino: 8,
        spider: 10,
        ant: 3,
        bee: 4,
        mouse: 30,
        queenBee: 38,
        bird: 55,
      };
      const expValue = expValues[enemy.type] || 2;
      if (enemy.isBoss) {
        const gemCount = enemy.type === "bird" ? 26 : enemy.type === "queenBee" ? 20 : 16;
        const gemValue = enemy.type === "bird" ? 8 : enemy.type === "queenBee" ? 7 : 6;
        for (let i = 0; i < gemCount; i += 1) {
          const angle = (Math.PI * 2 * i) / gemCount;
          const spread = 18 + (i % 5) * 10;
          gems.push({
            x: enemy.x + Math.cos(angle) * spread,
            y: enemy.y + Math.sin(angle) * spread,
            radius: 11,
            value: gemValue,
            bob: Math.random() * Math.PI * 2,
          });
        }
        hearts.push({
          x: enemy.x,
          y: enemy.y,
          radius: 13,
          heal: 38,
          bob: Math.random() * Math.PI * 2,
        });
      } else {
        gems.push({
          x: enemy.x,
          y: enemy.y,
          radius: 7 + Math.min(6, expValue * 0.6),
          value: expValue,
          bob: Math.random() * Math.PI * 2,
        });
      }
      floatText.push({ x: enemy.x, y: enemy.y - 12, text: "+EXP", life: 0.7 });
      updateUi();
    }

    function openUpgradeChoice() {
      world.pendingUpgrades = Math.max(0, world.pendingUpgrades - 1);
      world.paused = true;
      ui.levelUp.classList.add("show");
      ui.upgradeGrid.innerHTML = "";
      const choosingStarter = ownedWeaponCount() === 0;
      ui.upgradeTitle.textContent = choosingStarter ? "Choose a starting weapon" : "Choose an upgrade";
      ui.upgradeSubtitle.textContent = choosingStarter
        ? "Pick the first weapon for this run."
        : "The world pauses while you sharpen the build.";

      const canAddWeapon = ownedWeaponCount() < 5;
      const availableUpgrades = upgradePool
        .filter((upgrade) => (!upgrade.unlock || canAddWeapon) && (upgrade.weapon !== "crossbow" || crossbow.unlocked || upgrade.unlock) && (!upgrade.available || upgrade.available()));
      const guaranteed = availableUpgrades
        .filter((upgrade) => upgrade.unlock)
        .sort(() => Math.random() - 0.5)
        .slice(0, 3);
      const choices = availableUpgrades
        .filter((upgrade) => !guaranteed.includes(upgrade))
        .sort(() => Math.random() - 0.5)
        .slice(0, 3 - guaranteed.length);
      choices.unshift(...guaranteed);

      for (const upgrade of choices) {
        const button = document.createElement("button");
        button.className = "upgrade";
        button.type = "button";
        button.innerHTML = `<strong>${upgrade.name}</strong><span>${upgrade.text}</span>`;
        button.addEventListener("click", () => {
          upgrade.apply();
          if (!upgrade.unlock) {
            if (upgrade.weapon === "wand") wand.level += 1;
            if (upgrade.weapon === "crossbow") crossbow.level += 1;
            if (upgrade.weapon === "sword") sword.level += 1;
            if (upgrade.weapon === "asteroid") asteroidBelt.level += 1;
            if (upgrade.weapon === "lightning") lightningOrb.level += 1;
            if (upgrade.weapon === "ring") energyRing.level += 1;
            if (upgrade.weapon === "sky") skyLaser.level += 1;
            if (upgrade.weapon === "mine") landMine.level += 1;
            if (upgrade.weapon === "tadpole") tadpoleWeapon.level += 1;
            if (upgrade.weapon === "tongue") tongueWeapon.level += 1;
            if (upgrade.weapon === "puddle") puddleWeapon.level += 1;
            if (upgrade.weapon === "rain") rainWeapon.level += 1;
            if (upgrade.weapon === "banana") bananaWeapon.level += 1;
            if (upgrade.weapon === "shock") shockWaveWeapon.level += 1;
          }
          ui.levelUp.classList.remove("show");
          if (world.pendingUpgrades > 0) {
            openUpgradeChoice();
          } else {
            world.paused = false;
          }
          updateUi();
        });
        ui.upgradeGrid.appendChild(button);
      }

      const first = ui.upgradeGrid.querySelector("button");
      if (first) first.focus();
    }

    function update(dt) {
      if (world.paused) return;
      if (world.ended) return;

      world.time += dt;
      world.spawnTimer -= dt;
      world.bossTimer -= dt;
      world.antTimer -= dt;
      world.heartTimer -= dt;
      crossbow.timer -= dt;
      wand.timer -= dt;
      sword.timer -= dt;
      asteroidBelt.timer -= dt;
      lightningOrb.timer -= dt;
      landMine.timer -= dt;
      tadpoleWeapon.timer -= dt;
      tongueWeapon.timer -= dt;
      puddleWeapon.timer -= dt;
      rainWeapon.timer -= dt;
      bananaWeapon.timer -= dt;
      shockWaveWeapon.timer -= dt;
      player.hurtTimer = Math.max(0, player.hurtTimer - dt);

      const move = getMoveVector();
      if (move.moving) {
        player.x = clamp(player.x + move.x * player.speed * dt, player.radius, world.width - player.radius);
        player.y = clamp(player.y + move.y * player.speed * dt, player.radius, world.height - player.radius);
        if (puddleWeapon.unlocked && puddleWeapon.timer <= 0) {
          dropPuddle();
          puddleWeapon.timer = puddleWeapon.dropEvery;
        }
      }

      world.cameraX = clamp(player.x - window.innerWidth / 2, 0, world.width - window.innerWidth);
      world.cameraY = clamp(player.y - window.innerHeight / 2, 0, world.height - window.innerHeight);

      if (world.spawnTimer <= 0) {
        const eraLength = 42;
        const era = Math.floor(world.time / eraLength) % 6;
        const cycle = Math.floor(world.time / (eraLength * 6));
        const eraTier = era + cycle * 6;
        const softCap = Math.min(145, Math.max(55, 95 + Math.floor(world.time / 75) - eraTier * 3));
        const spawnCount = enemies.length > softCap ? 0 : 1;
        for (let i = 0; i < spawnCount; i += 1) spawnEnemy();
        const timePressure = Math.min(0.42, world.time * 0.00075);
        const cyclePressure = Math.min(0.28, cycle * 0.045);
        const tierBreathingRoom = era * 0.018;
        world.spawnEvery = Math.max(0.38, 0.82 - timePressure - cyclePressure + tierBreathingRoom);
        world.spawnTimer = world.spawnEvery;
      }

      if (world.bossTimer <= 0) {
        spawnBoss();
        world.bossTimer = 85 + Math.random() * 35;
      }

      if (world.antTimer <= 0) {
        spawnAntSwarm();
        world.antTimer = 95 + Math.random() * 55;
      }

      rebuildSpatialGrid();

      if (world.heartTimer <= 0) {
        if (Math.random() < 0.55) spawnHeart();
        world.heartTimer = 9 + Math.random() * 7;
      }

      if (crossbow.unlocked && crossbow.timer <= 0) {
        fireCrossbow();
        crossbow.timer = crossbow.cooldown;
      }

      if (wand.unlocked && wand.timer <= 0) {
        fireWand();
        wand.timer = wand.cooldown;
      }

      if (sword.unlocked && sword.timer <= 0) {
        fireSword();
        sword.timer = sword.cooldown;
      }

      if (asteroidBelt.unlocked && asteroidBelt.timer <= 0 && asteroids.length === 0) {
        spawnAsteroidBelt();
        asteroidBelt.timer = asteroidBelt.duration + asteroidBelt.cooldown;
      }

      if (lightningOrb.unlocked && lightningOrbs.length === 0) {
        syncLightningOrbs();
      }

      if (landMine.unlocked && landMine.timer <= 0) {
        dropLandMines();
        landMine.timer = landMine.cooldown;
      }

      if (tadpoleWeapon.unlocked && tadpoleWeapon.timer <= 0) {
        fireTadpoles();
        tadpoleWeapon.timer = tadpoleWeapon.cooldown;
      }

      if (tongueWeapon.unlocked && tongueWeapon.timer <= 0) {
        fireTongues();
        tongueWeapon.timer = tongueWeapon.duration + tongueWeapon.cooldown;
      }

      if (rainWeapon.unlocked && rainWeapon.timer <= 0) {
        fireRain();
        rainWeapon.timer = rainWeapon.cooldown;
      }

      if (bananaWeapon.unlocked && bananaWeapon.timer <= 0) {
        fireBananas();
        bananaWeapon.timer = bananaWeapon.cooldown;
      }

      if (shockWaveWeapon.unlocked && shockWaveWeapon.timer <= 0) {
        fireShockWaves();
        shockWaveWeapon.timer = shockWaveWeapon.cooldown;
      }

      for (let i = projectiles.length - 1; i >= 0; i -= 1) {
        const arrow = projectiles[i];
        arrow.x += arrow.vx * dt;
        arrow.y += arrow.vy * dt;
        arrow.life -= dt;

        let hit = false;
        for (const enemy of nearbyEnemies(arrow.x, arrow.y, arrow.radius + 34)) {
          if (enemy.dead || arrow.hitIds.has(enemy.id)) continue;
          const hitRange = arrow.radius + enemy.radius;
          if (distanceSq(arrow, enemy) < hitRange * hitRange) {
            enemy.hp -= arrow.damage;
            arrow.hitIds.add(enemy.id);
            floatText.push({ x: enemy.x, y: enemy.y - enemy.radius, text: Math.round(arrow.damage), life: 0.45 });
            if (enemy.hp <= 0) killEnemy(enemy);
            if (arrow.pierceLeft > 0) {
              arrow.pierceLeft -= 1;
            } else {
              hit = true;
              break;
            }
          }
        }

        if (hit || arrow.life <= 0) projectiles.splice(i, 1);
      }

      for (let i = tadpoles.length - 1; i >= 0; i -= 1) {
        const tadpole = tadpoles[i];
        const target = enemyById.get(tadpole.targetId) || randomEnemy();
        if (target) {
          tadpole.targetId = target.id;
          const desired = Math.atan2(target.y - tadpole.y, target.x - tadpole.x);
          let turn = angleDifference(desired, tadpole.angle);
          turn = clamp(turn, -4.6 * dt, 4.6 * dt);
          tadpole.angle += turn;
          tadpole.vx = Math.cos(tadpole.angle) * tadpole.speed;
          tadpole.vy = Math.sin(tadpole.angle) * tadpole.speed;
        }
        tadpole.x += tadpole.vx * dt;
        tadpole.y += tadpole.vy * dt;
        tadpole.wiggle += dt * 12;
        tadpole.life -= dt;

        let hit = false;
        for (const enemy of nearbyEnemies(tadpole.x, tadpole.y, tadpole.radius + 34)) {
          if (enemy.dead) continue;
          const hitRange = tadpole.radius + enemy.radius;
          if (distanceSq(tadpole, enemy) < hitRange * hitRange) {
            splashTadpole(tadpole);
            hit = true;
            break;
          }
        }

        if (hit || tadpole.life <= 0 || tadpole.x < -80 || tadpole.x > world.width + 80 || tadpole.y < -80 || tadpole.y > world.height + 80) {
          tadpoles.splice(i, 1);
        }
      }

      for (let i = raindrops.length - 1; i >= 0; i -= 1) {
        const drop = raindrops[i];
        drop.life -= dt;
        if (drop.life <= 0) {
          splashRain(drop);
          raindrops.splice(i, 1);
        }
      }

      for (let i = bananas.length - 1; i >= 0; i -= 1) {
        const banana = bananas[i];
        banana.life -= dt;
        banana.spin += dt * 10;
        const t = clamp(1 - banana.life / banana.maxLife, 0, 1);
        const previous = { x: banana.x, y: banana.y };
        const dirX = Math.cos(banana.travelAngle);
        const dirY = Math.sin(banana.travelAngle);
        const sideX = -dirY * banana.side;
        const sideY = dirX * banana.side;
        const away = Math.sin(Math.PI * t) * banana.range;
        const curve = Math.sin(Math.PI * 2 * t) * banana.curve;
        const returnPull = t * t;
        const baseX = banana.originX + (player.x - banana.originX) * returnPull;
        const baseY = banana.originY + (player.y - banana.originY) * returnPull;
        banana.x = baseX + dirX * away + sideX * curve;
        banana.y = baseY + dirY * away + sideY * curve;
        banana.angle = Math.atan2(banana.y - previous.y, banana.x - previous.x);

        for (const [enemyId, cooldown] of banana.hitCooldowns) {
          if (cooldown <= dt) {
            banana.hitCooldowns.delete(enemyId);
          } else {
            banana.hitCooldowns.set(enemyId, cooldown - dt);
          }
        }

        for (const enemy of nearbyEnemies(banana.x, banana.y, banana.radius + 34)) {
          if (enemy.dead || banana.hitCooldowns.has(enemy.id)) continue;
          const hitRange = banana.radius + enemy.radius;
          if (distanceSq(banana, enemy) < hitRange * hitRange) {
            enemy.hp -= banana.damage;
            banana.hitCooldowns.set(enemy.id, 0.32);
            floatText.push({ x: enemy.x, y: enemy.y - enemy.radius, text: Math.round(banana.damage), life: 0.42 });
            if (enemy.hp <= 0) killEnemy(enemy);
          }
        }

        if (banana.life <= 0 || (t > 0.82 && distanceSq(banana, player) < (player.radius + banana.radius) * (player.radius + banana.radius))) {
          bananas.splice(i, 1);
        }
      }

      for (let i = shockWaves.length - 1; i >= 0; i -= 1) {
        const wave = shockWaves[i];
        wave.x += wave.vx * dt;
        wave.y += wave.vy * dt;
        wave.life -= dt;
        wave.phase += dt * 10;

        const searchRange = wave.radius + wave.thickness + 36;
        for (const enemy of nearbyEnemies(wave.x, wave.y, searchRange)) {
          if (enemy.dead || wave.hitIds.has(enemy.id)) continue;
          const dx = enemy.x - wave.x;
          const dy = enemy.y - wave.y;
          const dist = Math.hypot(dx, dy);
          const band = wave.thickness + enemy.radius;
          if (Math.abs(dist - wave.radius) > band) continue;
          const enemyAngle = Math.atan2(dy, dx);
          if (Math.abs(angleDifference(enemyAngle, wave.angle)) > wave.arc / 2) continue;
          enemy.hp -= wave.damage;
          wave.hitIds.add(enemy.id);
          floatText.push({ x: enemy.x, y: enemy.y - enemy.radius, text: Math.round(wave.damage), life: 0.42 });
          if (enemy.hp <= 0) killEnemy(enemy);
        }

        if (wave.life <= 0 || wave.x < -120 || wave.x > world.width + 120 || wave.y < -120 || wave.y > world.height + 120) {
          shockWaves.splice(i, 1);
        }
      }

      for (let i = lasers.length - 1; i >= 0; i -= 1) {
        lasers[i].life -= dt;
        if (lasers[i].life <= 0) lasers.splice(i, 1);
      }

      for (let i = tongues.length - 1; i >= 0; i -= 1) {
        const tongue = tongues[i];
        tongue.life -= dt;
        tongue.phase += dt * 10;
        tongue.tick -= dt;
        const target = enemyById.get(tongue.targetId) || randomEnemy();
        if (target) tongue.targetId = target.id;

        for (const [enemyId, cooldown] of tongue.hitCooldowns) {
          if (cooldown <= dt) {
            tongue.hitCooldowns.delete(enemyId);
          } else {
            tongue.hitCooldowns.set(enemyId, cooldown - dt);
          }
        }

        if (target && tongue.tick <= 0) {
          const a = { x: player.x, y: player.y };
          const b = { x: target.x, y: target.y };
          const hitIds = new Set([target.id]);
          target.hp -= tongueWeapon.damage;
          floatText.push({ x: target.x, y: target.y - target.radius, text: Math.round(tongueWeapon.damage), life: 0.34 });
          if (target.hp <= 0) killEnemy(target);

          const reach = Math.hypot(b.x - a.x, b.y - a.y) + tongueWeapon.width + 60;
          for (const enemy of nearbyEnemies((a.x + b.x) / 2, (a.y + b.y) / 2, reach / 2 + 80)) {
            if (enemy.dead || hitIds.has(enemy.id) || tongue.hitCooldowns.has(enemy.id)) continue;
            const touchRange = enemy.radius + tongueWeapon.width / 2;
            if (distanceToSegmentSq(enemy, a, b) < touchRange * touchRange) {
              enemy.hp -= tongueWeapon.damage;
              hitIds.add(enemy.id);
              tongue.hitCooldowns.set(enemy.id, tongueWeapon.tickRate);
              floatText.push({ x: enemy.x, y: enemy.y - enemy.radius, text: Math.round(tongueWeapon.damage), life: 0.34 });
              if (enemy.hp <= 0) killEnemy(enemy);
            }
          }
          tongue.tick = tongueWeapon.tickRate;
        }

        if (tongue.life <= 0 || !target) tongues.splice(i, 1);
      }

      for (let i = slashes.length - 1; i >= 0; i -= 1) {
        slashes[i].life -= dt;
        if (slashes[i].life <= 0) slashes.splice(i, 1);
      }

      for (let i = explosions.length - 1; i >= 0; i -= 1) {
        explosions[i].life -= dt;
        if (explosions[i].life <= 0) explosions.splice(i, 1);
      }

      for (let i = puddles.length - 1; i >= 0; i -= 1) {
        const puddle = puddles[i];
        puddle.life -= dt;
        puddle.ripple += dt * 2.8;
        for (const [enemyId, cooldown] of puddle.hitCooldowns) {
          if (cooldown <= dt) {
            puddle.hitCooldowns.delete(enemyId);
          } else {
            puddle.hitCooldowns.set(enemyId, cooldown - dt);
          }
        }
        if (puddle.life <= 0) puddles.splice(i, 1);
      }

      for (let i = enemyProjectiles.length - 1; i >= 0; i -= 1) {
        const shot = enemyProjectiles[i];
        shot.x += shot.vx * dt;
        shot.y += shot.vy * dt;
        shot.life -= dt;

        const hitRange = player.radius + shot.radius;
        if (distanceSq(player, shot) < hitRange * hitRange) {
          player.hp -= shot.damage;
          player.hurtTimer = Math.max(player.hurtTimer, 0.35);
          floatText.push({ x: player.x, y: player.y - 24, text: `-${shot.damage}`, life: 0.55, danger: true });
          enemyProjectiles.splice(i, 1);
          if (player.hp <= 0) endRun();
          updateUi();
        } else if (shot.life <= 0 || shot.x < world.cameraX - 120 || shot.x > world.cameraX + window.innerWidth + 120 || shot.y < world.cameraY - 120 || shot.y > world.cameraY + window.innerHeight + 120) {
          enemyProjectiles.splice(i, 1);
        }
      }

      for (let i = mines.length - 1; i >= 0; i -= 1) {
        const mine = mines[i];
        mine.armed = Math.max(0, mine.armed - dt);
        mine.pulse += dt * 5;
        if (mine.armed > 0) continue;

        for (const enemy of nearbyEnemies(mine.x, mine.y, mine.radius + 34)) {
          if (enemy.dead) continue;
          const hitRange = enemy.radius + mine.radius;
          if (distanceSq(enemy, mine) < hitRange * hitRange) {
            explodeMine(mine);
            mines.splice(i, 1);
            break;
          }
        }
      }

      for (let i = asteroids.length - 1; i >= 0; i -= 1) {
        const asteroid = asteroids[i];
        asteroid.life -= dt;
        asteroid.angle += asteroidBelt.orbitSpeed * dt;

        for (const [enemyId, cooldown] of asteroid.hitCooldowns) {
          if (cooldown <= dt) {
            asteroid.hitCooldowns.delete(enemyId);
          } else {
            asteroid.hitCooldowns.set(enemyId, cooldown - dt);
          }
        }

        const asteroidX = player.x + Math.cos(asteroid.angle) * asteroid.orbitRadius;
        const asteroidY = player.y + Math.sin(asteroid.angle) * asteroid.orbitRadius;
        for (const enemy of nearbyEnemies(asteroidX, asteroidY, asteroid.radius + 34)) {
          if (enemy.dead || asteroid.hitCooldowns.has(enemy.id)) continue;
          const hitRange = enemy.radius + asteroid.radius;
          if (distanceSq(enemy, { x: asteroidX, y: asteroidY }) < hitRange * hitRange) {
            enemy.hp -= asteroid.damage;
            asteroid.hitCooldowns.set(enemy.id, 0.42);
            floatText.push({ x: enemy.x, y: enemy.y - enemy.radius, text: Math.round(asteroid.damage), life: 0.4 });
            if (enemy.hp <= 0) killEnemy(enemy);
          }
        }

        if (asteroid.life <= 0) asteroids.splice(i, 1);
      }

      for (let i = lightningOrbs.length - 1; i >= 0; i -= 1) {
        const orb = lightningOrbs[i];
        orb.x += orb.vx * dt;
        orb.y += orb.vy * dt;
        orb.phase += dt * 9;
        orb.radius = lightningOrb.size;
        orb.damage = lightningOrb.damage;

        const speed = Math.hypot(orb.vx, orb.vy) || 1;
        orb.vx = (orb.vx / speed) * lightningOrb.speed;
        orb.vy = (orb.vy / speed) * lightningOrb.speed;

        const minX = world.cameraX + orb.radius;
        const maxX = world.cameraX + window.innerWidth - orb.radius;
        const minY = world.cameraY + orb.radius;
        const maxY = world.cameraY + window.innerHeight - orb.radius;
        if (orb.x <= minX || orb.x >= maxX) {
          orb.x = clamp(orb.x, minX, maxX);
          orb.vx *= -1;
        }
        if (orb.y <= minY || orb.y >= maxY) {
          orb.y = clamp(orb.y, minY, maxY);
          orb.vy *= -1;
        }

        for (const [enemyId, cooldown] of orb.hitCooldowns) {
          if (cooldown <= dt) {
            orb.hitCooldowns.delete(enemyId);
          } else {
            orb.hitCooldowns.set(enemyId, cooldown - dt);
          }
        }

        for (const enemy of nearbyEnemies(orb.x, orb.y, orb.radius + 34)) {
          if (enemy.dead || orb.hitCooldowns.has(enemy.id)) continue;
          const hitRange = enemy.radius + orb.radius;
          if (distanceSq(enemy, orb) < hitRange * hitRange) {
            enemy.hp -= orb.damage;
            orb.hitCooldowns.set(enemy.id, 0.85);
            floatText.push({ x: enemy.x, y: enemy.y - enemy.radius, text: Math.round(orb.damage), life: 0.5 });
            if (enemy.hp <= 0) killEnemy(enemy);
          }
        }
      }

      if (energyRing.unlocked) {
        for (const [enemyId, cooldown] of energyRing.hitCooldowns) {
          if (cooldown <= dt) {
            energyRing.hitCooldowns.delete(enemyId);
          } else {
            energyRing.hitCooldowns.set(enemyId, cooldown - dt);
          }
        }

        for (const enemy of nearbyEnemies(player.x, player.y, energyRing.radius + 34)) {
          if (enemy.dead || energyRing.hitCooldowns.has(enemy.id)) continue;
          const hitRange = energyRing.radius + enemy.radius;
          if (distanceSq(player, enemy) < hitRange * hitRange) {
            enemy.hp -= energyRing.damage;
            energyRing.hitCooldowns.set(enemy.id, energyRing.tickRate);
            floatText.push({ x: enemy.x, y: enemy.y - enemy.radius, text: Math.round(energyRing.damage), life: 0.38 });
            if (enemy.hp <= 0) killEnemy(enemy);
          }
        }
      }

      if (skyLaser.unlocked) {
        syncSkyLasers();
        const usedTargets = new Set();
        for (const beam of skyLasers) {
          const current = enemyById.get(beam.targetId);
          if (!current || current.dead || current.hp <= 0) {
            retargetSkyLaser(beam, usedTargets);
          } else {
            usedTargets.add(current.id);
          }
        }

        for (const beam of skyLasers) {
          const target = enemyById.get(beam.targetId);
          if (!target) continue;
          beam.tick -= dt;
          beam.shimmer += dt * 12;
          if (beam.tick <= 0) {
            target.hp -= skyLaser.damage;
            beam.tick = skyLaser.tickRate;
            floatText.push({ x: target.x, y: target.y - target.radius, text: Math.round(skyLaser.damage), life: 0.32 });
            if (target.hp <= 0) {
              killEnemy(target);
              retargetSkyLaser(beam);
            }
          }
        }
      }

      for (const enemy of enemies) {
        if (enemy.dead) continue;
        const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        let slowAmount = 0;
        for (const puddle of puddles) {
          const touchRange = puddle.radius + enemy.radius * 0.5;
          if (distanceSq(enemy, puddle) < touchRange * touchRange) {
            slowAmount = Math.max(slowAmount, puddle.slow);
            if (!puddle.hitCooldowns.has(enemy.id)) {
              enemy.hp -= puddle.damage;
              puddle.hitCooldowns.set(enemy.id, puddle.tickRate);
              floatText.push({ x: enemy.x, y: enemy.y - enemy.radius, text: Math.round(puddle.damage), life: 0.34 });
              if (enemy.hp <= 0) killEnemy(enemy);
            }
          }
        }
        if (enemy.dead) continue;
        const speedScale = 1 - clamp(slowAmount, 0, 0.75);
        enemy.x += Math.cos(angle) * enemy.speed * speedScale * dt;
        enemy.y += Math.sin(angle) * enemy.speed * speedScale * dt;
        enemy.pulse += dt * 5;

        if (enemy.type === "mouse") {
          enemy.shotTimer -= dt;
          if (enemy.shotTimer <= 0) {
            fireBossProjectile(enemy);
            enemy.shotTimer = Math.max(0.55, 1.35 - world.time * 0.0015);
          }
        } else if (enemy.type === "queenBee") {
          enemy.spawnTimer -= dt;
          if (enemy.spawnTimer <= 0) {
            const beeCount = 2 + Math.min(3, Math.floor(world.time / 180));
            for (let i = 0; i < beeCount; i += 1) spawnBee(enemy);
            enemy.spawnTimer = Math.max(1.4, 3 - world.time * 0.002);
          }
        }

        const touchRange = player.radius + enemy.radius;
        if (distanceSq(player, enemy) < touchRange * touchRange && player.hurtTimer <= 0) {
          player.hp -= enemy.damage;
          player.hurtTimer = 0.55;
          floatText.push({ x: player.x, y: player.y - 24, text: `-${enemy.damage}`, life: 0.55, danger: true });
          if (player.hp <= 0) endRun();
          updateUi();
        }
      }

      for (let i = gems.length - 1; i >= 0; i -= 1) {
        const gem = gems[i];
        gem.bob += dt * 5;
        const d = distance(player, gem);
        if (d < 150) {
          const angle = Math.atan2(player.y - gem.y, player.x - gem.x);
          const pull = d < 55 ? 690 : 310;
          gem.x += Math.cos(angle) * pull * dt;
          gem.y += Math.sin(angle) * pull * dt;
        }
        if (d < player.radius + gem.radius + 3) {
          gainXp(gem.value);
          gems.splice(i, 1);
        }
      }

      for (let i = hearts.length - 1; i >= 0; i -= 1) {
        const heart = hearts[i];
        heart.bob += dt * 4;
        const d = distance(player, heart);
        if (d < 115) {
          const angle = Math.atan2(player.y - heart.y, player.x - heart.x);
          const pull = d < 45 ? 560 : 220;
          heart.x += Math.cos(angle) * pull * dt;
          heart.y += Math.sin(angle) * pull * dt;
        }
        if (d < player.radius + heart.radius + 3) {
          const healed = Math.min(heart.heal, player.maxHp - player.hp);
          player.hp = Math.min(player.maxHp, player.hp + heart.heal);
          if (healed > 0) {
            floatText.push({ x: player.x, y: player.y - 32, text: `+${Math.round(healed)}`, life: 0.65, heal: true });
          }
          hearts.splice(i, 1);
          updateUi();
        }
      }

      if (floatText.length > 90) floatText.splice(0, floatText.length - 90);
      for (let i = floatText.length - 1; i >= 0; i -= 1) {
        floatText[i].life -= dt;
        floatText[i].y -= 34 * dt;
        if (floatText[i].life <= 0) floatText.splice(i, 1);
      }
    }
